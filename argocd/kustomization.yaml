apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: argocd

resources:
  - namespace.yaml
  - https://raw.githubusercontent.com/argoproj/argo-cd/stable/manifests/ha/install.yaml
  - httproute.yaml

patches:
  - path: argocd-server-patch.yaml
  - path: argocd-cm-patch.yaml

images:
  # Pin Redis to a private ECR image (patched/hardened)
  - name: public.ecr.aws/docker/library/redis
    newName: ACCOUNT_ID.dkr.ecr.eu-central-1.amazonaws.com/redis
    newTag: 8-alpine-patched
