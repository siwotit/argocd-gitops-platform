<svg xmlns="http://www.w3.org/2000/svg" width="1280" height="720" viewBox="0 0 1280 720">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="argoGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e11d48"/>
      <stop offset="100%" style="stop-color:#be123c"/>
    </linearGradient>
    <linearGradient id="infraGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0369a1"/>
      <stop offset="100%" style="stop-color:#075985"/>
    </linearGradient>
    <linearGradient id="appGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#059669"/>
      <stop offset="100%" style="stop-color:#047857"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="4" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#64748b"/>
    </marker>
    <marker id="arrowRed" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#fb7185"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="1280" height="720" fill="url(#bg)"/>

  <!-- Grid -->
  <g opacity="0.04" stroke="#94a3b8" stroke-width="1">
    <line x1="0" y1="120" x2="1280" y2="120"/>
    <line x1="0" y1="240" x2="1280" y2="240"/>
    <line x1="0" y1="360" x2="1280" y2="360"/>
    <line x1="0" y1="480" x2="1280" y2="480"/>
    <line x1="0" y1="600" x2="1280" y2="600"/>
    <line x1="160" y1="0" x2="160" y2="720"/>
    <line x1="320" y1="0" x2="320" y2="720"/>
    <line x1="480" y1="0" x2="480" y2="720"/>
    <line x1="640" y1="0" x2="640" y2="720"/>
    <line x1="800" y1="0" x2="800" y2="720"/>
    <line x1="960" y1="0" x2="960" y2="720"/>
    <line x1="1120" y1="0" x2="1120" y2="720"/>
  </g>

  <!-- Title -->
  <text x="640" y="62" font-family="monospace" font-size="34" font-weight="bold" fill="#f1f5f9" text-anchor="middle">ArgoCD — GitOps Platform</text>
  <text x="640" y="98" font-family="monospace" font-size="17" fill="#64748b" text-anchor="middle">App-of-Apps · ApplicationSets · Multi-Repo · Image Updater · AWS EKS</text>
  <line x1="80" y1="116" x2="1200" y2="116" stroke="#334155" stroke-width="1"/>

  <!-- Git repos (left) -->
  <rect x="50" y="220" width="160" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="130" y="244" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">gitops-argocd</text>
  <text x="130" y="262" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">applicationsets/</text>

  <rect x="50" y="296" width="160" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="130" y="320" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">gitops-infra</text>
  <text x="130" y="338" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">Helm values / CRDs</text>

  <rect x="50" y="372" width="160" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="130" y="396" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">gitops-apps</text>
  <text x="130" y="414" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">jsapp Kustomize</text>

  <rect x="50" y="448" width="160" height="52" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1.5"/>
  <text x="130" y="472" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">gitops-payouts</text>
  <text x="130" y="490" font-family="monospace" font-size="11" fill="#475569" text-anchor="middle">pyapp + img updater</text>

  <!-- Arrows repos → ArgoCD -->
  <line x1="210" y1="246" x2="318" y2="246" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="322" x2="318" y2="322" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="398" x2="318" y2="398" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="210" y1="474" x2="318" y2="474" stroke="#475569" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ArgoCD box (center) -->
  <rect x="320" y="150" width="300" height="420" rx="12" fill="#1e1030" stroke="#e11d48" stroke-width="2"/>
  <rect x="320" y="150" width="300" height="56" rx="12" fill="url(#argoGrad)" filter="url(#glow)"/>
  <rect x="320" y="190" width="300" height="16" rx="0" fill="url(#argoGrad)"/>
  <text x="470" y="184" font-family="monospace" font-size="17" font-weight="bold" fill="#ffffff" text-anchor="middle">ArgoCD (HA)</text>

  <!-- Bootstrap -->
  <rect x="340" y="220" width="260" height="44" rx="6" fill="#1e293b" stroke="#475569" stroke-width="1"/>
  <text x="470" y="240" font-family="monospace" font-size="12" fill="#f43f5e" text-anchor="middle" font-weight="bold">root-app (bootstrap)</text>
  <text x="470" y="256" font-family="monospace" font-size="10" fill="#64748b" text-anchor="middle">single kubectl apply seeds platform</text>

  <!-- AppSets -->
  <rect x="340" y="278" width="260" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="470" y="298" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">infrastructure-helm-appset</text>
  <text x="470" y="312" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">Helm multi-source · 10+ charts</text>

  <rect x="340" y="328" width="260" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="470" y="348" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">infrastructure-manifests-appset</text>
  <text x="470" y="362" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">CRDs · HTTPRoutes · NodePools</text>

  <rect x="340" y="378" width="260" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="470" y="398" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">apps-appset</text>
  <text x="470" y="412" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">jsapp · Kustomize overlays</text>

  <rect x="340" y="428" width="260" height="40" rx="6" fill="#1e293b" stroke="#334155" stroke-width="1"/>
  <text x="470" y="448" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">payouts-apps-appset</text>
  <text x="470" y="462" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">pyapp · Image Updater · ECR</text>

  <!-- Image Updater -->
  <rect x="340" y="480" width="260" height="40" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="470" y="500" font-family="monospace" font-size="11" fill="#fbbf24" text-anchor="middle">ArgoCD Image Updater</text>
  <text x="470" y="514" font-family="monospace" font-size="10" fill="#475569" text-anchor="middle">ECR watch → git write-back</text>

  <!-- Arrows ArgoCD → EKS -->
  <line x1="620" y1="300" x2="718" y2="260" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="620" y1="350" x2="718" y2="350" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="620" y1="400" x2="718" y2="440" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowRed)"/>
  <line x1="620" y1="450" x2="718" y2="500" stroke="#fb7185" stroke-width="1.5" marker-end="url(#arrowRed)"/>

  <!-- EKS infra box -->
  <rect x="720" y="200" width="240" height="100" rx="8" fill="url(#infraGrad)"/>
  <text x="840" y="236" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Infrastructure</text>
  <text x="840" y="256" font-family="monospace" font-size="11" fill="#bae6fd" text-anchor="middle">Istio · AWS LBC · ExternalDNS</text>
  <text x="840" y="274" font-family="monospace" font-size="11" fill="#bae6fd" text-anchor="middle">Cert-Manager · KEDA · Karpenter</text>
  <text x="840" y="292" font-family="monospace" font-size="11" fill="#bae6fd" text-anchor="middle">Prometheus · Argo Rollouts</text>

  <!-- EKS apps box -->
  <rect x="720" y="320" width="240" height="80" rx="8" fill="url(#appGrad)"/>
  <text x="840" y="352" font-family="monospace" font-size="14" font-weight="bold" fill="#ffffff" text-anchor="middle">Applications</text>
  <text x="840" y="372" font-family="monospace" font-size="11" fill="#d1fae5" text-anchor="middle">jsapp · pyapp</text>
  <text x="840" y="390" font-family="monospace" font-size="11" fill="#d1fae5" text-anchor="middle">Kustomize · per-env overlays</text>

  <!-- ECR box -->
  <rect x="720" y="420" width="240" height="80" rx="8" fill="#1e293b" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="840" y="452" font-family="monospace" font-size="14" font-weight="bold" fill="#fbbf24" text-anchor="middle">AWS ECR</text>
  <text x="840" y="472" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">Image tags: [sha]-prod</text>
  <text x="840" y="490" font-family="monospace" font-size="11" fill="#94a3b8" text-anchor="middle">auto-detected by Image Updater</text>

  <!-- Badges -->
  <rect x="80" y="610" width="160" height="52" rx="6" fill="#1e293b" stroke="#e11d48" stroke-width="1"/>
  <text x="160" y="634" font-family="monospace" font-size="12" fill="#fb7185" text-anchor="middle">App-of-Apps</text>
  <text x="160" y="652" font-family="monospace" font-size="11" fill="#f1f5f9" text-anchor="middle">self-managing bootstrap</text>

  <rect x="270" y="610" width="160" height="52" rx="6" fill="#1e293b" stroke="#0ea5e9" stroke-width="1"/>
  <text x="350" y="634" font-family="monospace" font-size="12" fill="#38bdf8" text-anchor="middle">Multi-Source Helm</text>
  <text x="350" y="652" font-family="monospace" font-size="11" fill="#f1f5f9" text-anchor="middle">chart + values split</text>

  <rect x="460" y="610" width="160" height="52" rx="6" fill="#1e293b" stroke="#10b981" stroke-width="1"/>
  <text x="540" y="634" font-family="monospace" font-size="12" fill="#34d399" text-anchor="middle">Image Updater</text>
  <text x="540" y="652" font-family="monospace" font-size="11" fill="#f1f5f9" text-anchor="middle">ECR → git write-back</text>

  <rect x="650" y="610" width="160" height="52" rx="6" fill="#1e293b" stroke="#a78bfa" stroke-width="1"/>
  <text x="730" y="634" font-family="monospace" font-size="12" fill="#c4b5fd" text-anchor="middle">HA Deploy</text>
  <text x="730" y="652" font-family="monospace" font-size="11" fill="#f1f5f9" text-anchor="middle">patched Redis image</text>

  <rect x="840" y="610" width="160" height="52" rx="6" fill="#1e293b" stroke="#f59e0b" stroke-width="1"/>
  <text x="920" y="634" font-family="monospace" font-size="12" fill="#fbbf24" text-anchor="middle">Gateway API</text>
  <text x="920" y="652" font-family="monospace" font-size="11" fill="#f1f5f9" text-anchor="middle">HTTPRoute for UI</text>

  <rect x="1030" y="610" width="180" height="52" rx="6" fill="#1e293b" stroke="#64748b" stroke-width="1"/>
  <text x="1120" y="634" font-family="monospace" font-size="12" fill="#94a3b8" text-anchor="middle">Multi-Repo GitOps</text>
  <text x="1120" y="652" font-family="monospace" font-size="11" fill="#f1f5f9" text-anchor="middle">4 repos · team isolation</text>

  <text x="640" y="700" font-family="monospace" font-size="12" fill="#334155" text-anchor="middle">ArgoCD · ApplicationSet · Image Updater · Argo Rollouts · Kustomize · Helm · AWS EKS</text>
</svg>
