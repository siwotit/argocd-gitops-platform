apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: argocd-appsets
  namespace: argocd
  labels:
    app: bootstrap
spec:
  project: default
  source:
    repoURL: https://github.com/org/gitops-argocd.git
    targetRevision: main
    path: applicationsets
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
